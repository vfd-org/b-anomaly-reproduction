additional_resources:
- {description: CERN document server with supplemental material, location: 'https://cds.cern.ch/record/2748571'}
- {description: Preprint on arXiv, location: 'https://arxiv.org/abs/2012.13241'}
comment: |
  CERN-LHC.  Measurements of the angular observables in the B+ --> K*+ mu+ mu- decay with K*+ --> KS0 pi+ and KS0 -> pi+ pi- using proton-proton collisions at a centre-of-mass energy of 7, 8 and 13 TeV with 9 fb^-1 of data collected in 2011-2018. The final states used are 3 charged pions and 2 muons. The fit is performed simultaneously in the sub sets of Run 1 and 2 and the two distinct KS0 categories, whether or not the KS0 decays inside the Vertex Locator or not. Values for the observables in two angular basis are determined, namely the S and P(') basis.

  The reported central values of the angular observables in Table 1 and 2 are evaluated using angular folding techniques. The asymmetric statistical uncertainties are obtained by Feldman-Cousins scans. The correlation between all observables are determined using a bootstrapping method.
hepdata_doi: 10.17182/hepdata.105273.v1
---
data_file: data1.yaml
description: "Results for the CP-averaged observables Fl, Afb and S3\u2013S9. The
  first uncertainties are statistical and the second systematic."
keywords:
- name: reactions
  values: [B+ --> K*+ mu+ mu-]
- name: observables
  values: [Fl, S3, S4, S5, Afb, S7, S8, S9]
- name: cmenergies
  values: [7000.0, 8000.0, 13000.0]
- name: phrases
  values: [Rare decay, Penguin decay, flavor anomalies, B -> K* mu mu, bsll, angular
      analysis, angular observables]
location: Data from Table 1 on Page 11
name: Table 1
table_doi: 10.17182/hepdata.105273.v1/t1
